# Default values for workload.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 0

# Workload kind: Deployment (default), DaemonSet, or StatefulSet.
# kind: Deployment

# For StatefulSet workloads, set serviceName to match the headless Service name.
# serviceName: ""

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []

# Override the container entrypoint command.
command: []
# command:
#   - /bin/sh
#   - -c

# Override the container arguments.
args: []
# args:
#   - --some-flag
#   - value

nameOverride: ""
fullnameOverride: ""
# namespaceOverride: ""

# Deployment strategy (e.g. Recreate, RollingUpdate).
# strategy: {}

# Number of old ReplicaSets to retain. Default: 3.
# revisionHistoryLimit: 3

# Pod restart policy. Default: Always.
# restartPolicy: Always

# Runtime class for specialised node runtimes (e.g. nvidia).
# runtimeClassName: nvidia

# Enable host networking for the pod.
# hostNetwork: false

# DNS policy override (e.g. ClusterFirstWithHostNet when hostNetwork is true).
# dnsPolicy: ClusterFirst

# Seconds the pod needs to terminate gracefully.
# terminationGracePeriodSeconds: 30

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  name: http
  type: ClusterIP
  port: 80
  containerPort: 8080
  # annotations: {}

# Additional container/service ports beyond the primary service port.
extraPorts: []
  # - name: queue
  #   port: 10001
  #   containerPort: 10001
  # - name: table
  #   port: 10002
  #   containerPort: 10002

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Probes: Default startup, readiness and liveness probes all use httpGet against
# /healthz/startup, /healthz/ready and /healthz/live on port 8080 respectively.
# To customise, set the full probe object — it replaces the default entirely.
# To disable a probe, set it to false.
# startupProbe: false    # disables the default probe
# readinessProbe: false  # disables the default probe
# livenessProbe: false   # disables the default probe

# Container lifecycle hooks (preStop, postStart).
# lifecycle: {}

autoscaling:
  enabled: false

# Init containers run before the main container starts.
initContainers: []
  # - name: init-db
  #   image: busybox
  #   command: ["sh", "-c", "echo initialising"]

# Additional sidecar containers alongside the main container.
extraContainers: []
  # - name: log-shipper
  #   image: fluent/fluent-bit
  #   volumeMounts:
  #     - name: logs
  #       mountPath: /var/log

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

# PersistentVolumeClaim resources created alongside the Deployment.
persistentVolumeClaims: []
  # - name: my-pvc
  #   storageClassName: longhorn
  #   accessModes:
  #     - ReadWriteMany
  #   storage: 512Mi

# ConfigMap resources created alongside the Deployment.
configMaps: []
  # - name: my-config
  #   data:
  #     config.json: |
  #       {"key": "value"}

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels: {}

# Downward API environment variables. Set to null to disable for non-.NET apps.
# Note: envFieldRef: {} does NOT clear defaults due to Helm deep merge — use null.
envFieldRef:
  AppConfig__NodeName: spec.nodeName
  AppConfig__PodName: metadata.name
  AppConfig__Namespace: metadata.namespace
  AppConfig__PodIp: status.podIP
  AppConfig__ServiceAccountName: spec.serviceAccountName

envVars: {}
#  MY_ENV_VAR: some-value
envSecrets: {}
#  MY_SECRET_KEY: my-secret-name
envVarsFrom: []
  # - configMapRef:
  #     name: default-app-config
