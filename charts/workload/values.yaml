# Default values for workload.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 0

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []

# Override the container entrypoint command.
command: []
# command:
#   - /bin/sh
#   - -c

# Override the container arguments.
args: []
# args:
#   - --some-flag
#   - value

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  name: http
  type: ClusterIP
  port: 80
  containerPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Probes: Default startup, readiness and liveness probes all use httpGet against
# /healthz/startup, /healthz/ready and /healthz/live on port 8080 respectively.
# To customise, set the full probe object — it replaces the default entirely.
# To disable a probe, set it to false.
# startupProbe: false    # disables the default probe
# readinessProbe: false  # disables the default probe
# livenessProbe: false   # disables the default probe

autoscaling:
  enabled: false

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

# PersistentVolumeClaim resources created alongside the Deployment.
persistentVolumeClaims: []
  # - name: my-pvc
  #   storageClassName: longhorn
  #   accessModes:
  #     - ReadWriteMany
  #   storage: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

envFieldRef:
  AppConfig__NodeName: spec.nodeName
  AppConfig__PodName: metadata.name
  AppConfig__Namespace: metadata.namespace
  AppConfig__PodIp: status.podIP
  AppConfig__ServiceAccountName: spec.serviceAccountName

envVars: {}
#  MY_ENV_VAR: some-value
envSecrets: {}
#  MY_SECRET_KEY: my-secret-name
envVarsFrom: {}
  # configMapRef:
  #   name: default-app-config
