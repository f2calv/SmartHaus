{{- define "workload.cronjob" -}}
apiVersion: batch/v1beta1
kind: CronJob
metadata:
  name: {{ include "workload.fullname" . }}
  namespace: {{ include "workload.namespace" $ }}
  labels:
    {{- include "workload.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cronJob.schedule }}
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      template:
        metadata:
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          labels:
            {{- include "workload.labels" . | nindent 12 }}
{{- range $key, $val := .Values.labels }}
            {{ $key }}: {{ $val | quote }}
{{- end}}
            {{- with .Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        spec:
          restartPolicy: {{ default "Never" .Values.restartPolicy }}
          runtimeClassName: {{ default "" .Values.runtimeClassName }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 8 }}
          {{- end }}
          {{- if .Values.serviceAccount }}
          serviceAccountName: {{ .Values.serviceAccount.name | quote }}
          {{- end }}
          {{- if and (hasKey .Values "podSecurityContext") (.Values.podSecurityContext) }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          {{- end }}
          containers:
          - name: {{ .Chart.Name }}
            {{- if and (hasKey .Values "securityContext") (.Values.securityContext) }}
            securityContext:
              {{- toYaml .Values.securityContext | nindent 14 }}
            {{- end }}
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
            imagePullPolicy: {{ default "IfNotPresent" .Values.image.pullPolicy }}
            {{- with .Values.command }}
            command:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- with .Values.args }}
            args:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- include "workload.probes" . | trim | nindent 12 }}
            env:
              - name: AppConfig__NodeName
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              - name: AppConfig__PodName
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              - name: AppConfig__Namespace
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              - name: AppConfig__PodIp
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
              - name: AppConfig__ServiceAccountName
                valueFrom:
                  fieldRef:
                    fieldPath: spec.serviceAccountName
              {{- range $key, $value := $.Values.envVars }}
              - name: {{ $key }}
                value: {{ $value | quote }}
              {{- end }}
              {{- range $key, $secret := $.Values.envSecrets }}
              - name: {{ $key }}
                valueFrom:
                  secretKeyRef:
                    name: {{ $secret }}
                    key: {{ $key | quote }}
              {{- end }}
            envFrom:
              - configMapRef:
                  name: environment-config
              - configMapRef:
                  name: connectionstrings-config
{{- if and (hasKey .Values "resources") (.Values.resources) }}
            resources:
              {{- toYaml .Values.resources | nindent 14 }}
            {{- end }}
            {{- with .Values.volumeMounts }}
            volumeMounts:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- with .Values.volumes }}
          volumes:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}