{{- if (gt (int .Values.replicaCount) 0) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "workload.fullname" . }}
  namespace: {{ include "workload.namespace" $ }}
  labels:
    {{- include "workload.labels" . | nindent 4 }}
spec:
  type: {{ default "ClusterIP" .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.containerPort }}
      protocol: {{ default "TCP" .Values.service.protocol }}
      name: {{ .Values.service.name }}
    {{- range .Values.extraPorts }}
    - port: {{ .port }}
      targetPort: {{ .containerPort }}
      protocol: {{ default "TCP" .protocol }}
      name: {{ .name }}
    {{- end }}
  selector:
    {{- include "workload.selectorLabels" $ | nindent 4 }}
{{- end }}
